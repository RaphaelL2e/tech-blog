<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --border: #27272a;
            --code-bg: #0f0f15;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        
        header h1 a {
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        header h1 a::before {
            content: '◆';
            color: var(--accent);
            font-size: 0.875rem;
        }
        
        nav {
            display: flex;
            gap: 1.5rem;
        }
        
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }
        
        nav a:hover {
            color: var(--text-primary);
        }
        
        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.2s;
        }
        
        nav a:hover::after {
            width: 100%;
        }
        
        /* Main Content */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        
        /* Article List */
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        article {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        
        article:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        
        article h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        article h2 a {
            color: var(--text-primary);
            text-decoration: none;
        }
        
        article h2 a:hover {
            color: var(--accent);
        }
        
        .meta {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        
        .meta span {
            color: var(--accent);
        }
        
        .summary {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            line-height: 1.7;
        }
        
        .summary a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            margin-left: 0.5rem;
        }
        
        .summary a:hover {
            text-decoration: underline;
        }
        
        /* Single Post */
        .post-header {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        
        .post-header h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 1rem;
        }
        
        .post-content {
            font-size: 1rem;
            line-height: 1.8;
        }
        
        .post-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .post-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            color: var(--accent);
        }
        
        .post-content h4 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 1.5rem 0 0.75rem;
        }
        
        .post-content p {
            margin-bottom: 1.25rem;
            color: var(--text-secondary);
        }
        
        .post-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .post-content a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .post-content a:hover {
            text-decoration: underline;
        }
        
        .post-content ul, .post-content ol {
            margin: 1rem 0 1.5rem 1.5rem;
            color: var(--text-secondary);
        }
        
        .post-content li {
            margin-bottom: 0.5rem;
        }
        
        .post-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--code-bg);
            color: var(--accent);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.875em;
        }
        
        .post-content pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }
        
        .post-content pre code {
            background: none;
            color: var(--text-primary);
            padding: 0;
        }
        
        .post-content blockquote {
            border-left: 3px solid var(--accent);
            background: var(--bg-tertiary);
            padding: 1rem 1.25rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
        }
        
        .post-content blockquote p {
            margin: 0;
            color: var(--text-secondary);
        }
        
        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9375rem;
        }
        
        .post-content th {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 600;
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 2px solid var(--border);
        }
        
        .post-content td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        .post-content tr:hover td {
            background: var(--bg-tertiary);
        }
        
        /* Footer */
        footer {
            max-width: 900px;
            margin: 4rem auto 0;
            padding: 2rem 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Selection */
        ::selection {
            background: var(--accent-glow);
            color: var(--text-primary);
        }

        /* Tags Cloud */
        /* Tags Grid */
        .tags-container {
            max-width: 900px;
        }

        .tags-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .tag-card {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.625rem 1rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .tag-card:hover {
            border-color: var(--accent);
            background: var(--bg-tertiary);
            transform: translateY(-1px);
        }

        .tag-card .tag-name {
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-weight: 500;
        }

        .tag-card .tag-num {
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            line-height: 1;
        }

        /* Category Tree */
        .categories-container {
            max-width: 900px;
        }

        .category-tree {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tree-branch {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .tree-branch:hover {
            border-color: var(--accent);
        }

        .branch-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            border-bottom: 1px solid var(--border);
        }

        .branch-icon {
            font-size: 1.25rem;
        }

        .branch-name {
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            flex: 1;
        }

        .branch-name:hover {
            color: var(--accent);
        }

        .branch-count {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .branch-leaves {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
        }

        .leaf-item {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-decoration: none;
            padding: 0.375rem 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .leaf-item:hover {
            background: var(--accent);
            color: white;
        }

        .leaf-more {
            color: var(--accent);
            font-size: 0.875rem;
            text-decoration: none;
            padding: 0.375rem 0.75rem;
            font-weight: 500;
        }

        .leaf-more:hover {
            text-decoration: underline;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .modal-count {
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }

        .modal-close {
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1rem;
            overflow-y: auto;
            max-height: calc(80vh - 80px);
        }

        .modal-article {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            margin-bottom: 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .modal-article:hover {
            background: var(--accent);
        }

        .modal-article-title {
            color: var(--text-primary);
            font-weight: 500;
        }

        .modal-article:hover .modal-article-title {
            color: white;
        }

        .modal-article-date {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .modal-article:hover .modal-article-date {
            color: rgba(255, 255, 255, 0.8);
        }

        .tag-card {
            cursor: pointer;
        }

        /* Tag Modal - Large */
        .tag-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .tag-modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            height: 600px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
        }

        .tag-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            flex-shrink: 0;
        }

        .tag-modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .modal-count {
            background: var(--accent);
            color: white;
            font-size: 0.875rem;
            font-weight: 700;
            padding: 0.375rem 1rem;
            border-radius: 20px;
        }

        .tag-modal-close {
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .tag-modal-close:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .tag-modal-body {
            padding: 1.5rem 2rem;
            overflow-y: auto;
            flex: 1;
        }

        .modal-article {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            margin-bottom: 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .modal-article:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateX(8px);
        }

        .modal-article-title {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1rem;
        }

        .modal-article:hover .modal-article-title {
            color: white;
        }

        .modal-article-date {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .modal-article:hover .modal-article-date {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Category Tree */
        .category-tree {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tree-branch {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .tree-branch:hover {
            border-color: var(--accent);
        }

        .branch-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            border-bottom: 1px solid var(--border);
        }

        .branch-icon {
            font-size: 1.25rem;
        }

        .branch-name {
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            flex: 1;
        }

        .branch-name:hover {
            color: var(--accent);
        }

        .branch-count {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .branch-leaves {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
        }

        .leaf-item {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-decoration: none;
            padding: 0.375rem 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .leaf-item:hover {
            background: var(--accent);
            color: white;
        }

        .leaf-more {
            color: var(--accent);
            font-size: 0.875rem;
            padding: 0.375rem 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .leaf-more:hover {
            text-decoration: underline;
        }

        /* Taxonomy Detail Page */
        .taxonomy-detail {
            max-width: 900px;
        }

        .taxonomy-stats {
            margin-bottom: 2rem;
        }

        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent);
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 6px;
        }

        .taxonomy-articles {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .taxonomy-article {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .taxonomy-article:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .article-link {
            display: block;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
        }

        .taxonomy-article h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .article-meta {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .article-summary {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
            <nav>
                <a href="{{ .Site.BaseURL }}">首页</a>
                <a href="{{ .Site.BaseURL }}posts/">文章</a>
                <a href="{{ .Site.BaseURL }}categories/">分类</a>
                <a href="{{ .Site.BaseURL }}tags/">标签</a>
                <a href="{{ .Site.BaseURL }}about/">关于</a>
            </nav>
        </div>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Params.author | default .Site.Title }}</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 2px solid #3498db; padding-bottom: 20px; margin-bottom: 30px; }
        header h1 a { color: #2c3e50; text-decoration: none; }
        nav { margin-top: 10px; }
        nav a { margin-right: 20px; color: #3498db; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        article { margin-bottom: 40px; }
        article h2 { color: #2c3e50; margin-bottom: 10px; }
        article h2 a { color: inherit; text-decoration: none; }
        article h2 a:hover { text-decoration: underline; }
        .meta { color: #7f8c8d; font-size: 0.9em; margin-bottom: 10px; }
        .summary { color: #555; }
        footer { margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; color: #7f8c8d; text-align: center; }
        h1, h2, h3, h4 { margin: 20px 0 10px; }
        p { margin-bottom: 15px; }
        ul, ol { margin-left: 20px; margin-bottom: 15px; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; margin-bottom: 15px; }
        blockquote { border-left: 4px solid #3498db; padding-left: 20px; margin: 15px 0; color: #666; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
        <nav>
            <a href="{{ .Site.BaseURL }}">首页</a>
            <a href="{{ .Site.BaseURL }}posts/">文章</a>
            <a href="{{ .Site.BaseURL }}about/">关于</a>
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Params.author | default .Site.Title }}. All rights reserved.</p>
    </footer>
</body>
</html>

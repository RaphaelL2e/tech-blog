<!doctype html>
<html lang="{{ .Site.LanguageCode | default "zh-CN" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="page-{{ .Kind }} section-{{ .Section | default "home" }}">
  <a class="skip-link" href="#main-content">跳到正文</a>
  {{ partial "header.html" . }}
  <main id="main-content" class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <div class="sr-only" id="live-region" aria-live="polite"></div>
  <script src="{{ "js/site.js" | relURL }}" defer></script>
</body>
</html>

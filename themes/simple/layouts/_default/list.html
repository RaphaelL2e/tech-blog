{{ define "main" }}
<section class="library-hero shell narrow-hero">
  <p class="eyebrow">KNOWLEDGE BASE</p>
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="lead">{{ . }}</div>{{ end }}
</section>
<section class="shell section-block">
  <div class="post-grid">
    {{ range .Paginator.Pages }}{{ partial "post-card.html" . }}{{ end }}
  </div>
  {{ partial "pagination.html" . }}
</section>
{{ end }}
